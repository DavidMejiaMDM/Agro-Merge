<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Confirmación de registro - Agro-Merge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
	<link href="../../eCommerceAssets/styles/styles.css" rel="stylesheet" type="text/css">
</head>
<body>
  <div class="styles-layout">
    <main class="styles-panel">
      <header class="styles-panel__header">
        <div class="logo">
          <img src="../../eCommerceAssets/img/logo.png" alt="Agro-Merge" class="logo__img" />
          <span class="logo__text">Agro-Merge</span>
        </div>
      </header>

      <section class="styles-panel__body">
        <h1 class="styles-title">Confirmación de registro</h1>
        <p class="styles-subtitle">
          Ingresa el código de verificación que te enviamos a
          <strong>user@gmail.com</strong>.
        </p>

        <p
          style="
            font-size: 13px;
            color: #16a34a;
            margin-bottom: 6px;
            text-align: center;
          "
        >
          Ingresar código
        </p>

        <div class="code-inputs">
          <input type="text" maxlength="1" />
          <input type="text" maxlength="1" />
          <input type="text" maxlength="1" />
          <input type="text" maxlength="1" />
        </div>

        <button class="btn btn--primary" style="width: 100%; max-width: 260px; margin: 0 auto 18px; display: block;">
          Verificar
        </button>

        <p
          style="
            font-size: 13px;
            color: #6b7280;
            text-align: center;
            margin-bottom: 4px;
          "
        >
          El código puede tardar unos segundos en llegar.
        </p>
        <p style="font-size: 13px; text-align: center;">
          ¿No te llegó el código?
          <a href="#" class="link">Reenviar</a>
        </p>
      </section>

      <footer class="styles-panel__footer">
        <span>Todos los derechos reservados © Agromerge</span>
        <span>Política de Privacidad</span>
      </footer>
    </main>

    <aside class="styles-image"></aside>
  </div>
</body>
</html>
